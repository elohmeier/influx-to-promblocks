# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: influx-to-promblocks

before:
  hooks:
    - go mod download

builds:
  - id: influx-to-promblocks
    main: ./cmd/influx-to-promblocks
    binary: influx-to-promblocks
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .FullCommit }} -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: influx-to-promblocks
    ids:
      - influx-to-promblocks
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - examples/*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  github:
    owner: elohmeier
    name: influx-to-promblocks
  name_template: "{{ .Tag }}"
  prerelease: auto
  replace_existing_artifacts: true
